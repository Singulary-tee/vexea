    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "VEXEA",
      "url": "https://vexea-international.web.app",
      "description": "Multiplayer PvE drone survival shooter with authoritative networking and AI-driven drone combat.",

        "First-person shooter",

      ],

    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    
  </head>
  <body class="bg-black text-white overflow-hidden select-none overscroll-none" style="touch-action: none; font-family: 'Barlow Condensed', sans-serif; background: #0A0A0A; text-transform: uppercase;">
    <div id="portrait-lock" style="
      display: flex;
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      letter-spacing: 8px;
      color: #FF4500;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    ">ROTATE DEVICE</div>
    <script>
      (function() {
        const lock = document.getElementById('portrait-lock');
        const blockEvents = ["pointerdown", "pointerup", "pointermove", "mousedown", "mouseup", "mousemove", "click", "touchstart", "touchend", "touchmove"];
        blockEvents.forEach(evt => {
          lock.addEventListener(evt, (e) => {
            e.stopPropagation();
            e.preventDefault();
          }, { capture: true });
        });
        function checkOrientation() {
          const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
          const isPortrait = isMobile && (window.innerHeight > window.innerWidth);
          if (isPortrait) {
            lock.style.opacity = '1';
            lock.style.pointerEvents = 'auto';
          } else {
            lock.style.opacity = '0';
            lock.style.pointerEvents = 'none';
          }
        }
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation();
      })();
    </script>
    <div id="root" class="fixed inset-0 w-full h-full"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
